<!-- CÓDIGO DO BOTÃO E PLAYER DE ÁUDIO -->
<div class="audio-box" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
  <button id="btn-audio" onclick="gerarAudio()" class="btn-secundario" style="background: #2b3a4a; color: #fff; padding: 10px 20px; border-radius: 8px; border: 1px solid #4a5d73; cursor: pointer; font-weight: bold; width: 100%;">
    🎙️ Gerar Locução em MP3 (ElevenLabs)
  </button>
  
  <div id="audio-player-container" style="display: none; margin-top: 15px; text-align: center;">
    <audio id="audio-player" controls style="width: 100%; outline: none; margin-bottom: 15px;"></audio>
    <a id="download-audio-link" download="locucao-cupomclic.mp3" style="display: inline-block; background: #e69c5e; color: #1a2530; padding: 10px 25px; border-radius: 6px; font-weight: bold; text-decoration: none;">
      ⬇️ Baixar Arquivo MP3
    </a>
  </div>
</div>

<script>
// FUNÇÃO PARA CHAMAR O BACKEND E BAIXAR O ÁUDIO
async function gerarAudio() {
  const notaElement = document.getElementById('nota-live');
  const textoLive = notaElement ? notaElement.innerText : '';
  const btn = document.getElementById('btn-audio');
  const container = document.getElementById('audio-player-container');
  const player = document.getElementById('audio-player');
  const downloadLink = document.getElementById('download-audio-link');

  if (!textoLive || textoLive.trim() === '') {
    return alert('Por favor, gere as notas de venda primeiro!');
  }

  btn.innerText = '⏳ Gravando Locução (isso pode levar 5 a 10s)...';
  btn.disabled = true;
  btn.style.opacity = '0.7';

  try {
    const res = await fetch('/api/generate-audio', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: textoLive })
    });

    const data = await res.json();

    if (data.sucesso) {
      player.src = data.audioUrl;
      downloadLink.href = data.audioUrl;
      
      // Esconde o botão gerar e mostra o player + botão de baixar
      btn.style.display = 'none';
      container.style.display = 'block';
    } else {
      alert(data.erro || 'Erro ao gerar áudio.');
      btn.innerText = '🎙️ Tentar Novamente';
    }
  } catch (err) {
    alert('Erro de conexão com o servidor de áudio.');
    btn.innerText = '🎙️ Tentar Novamente';
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}
</script>
