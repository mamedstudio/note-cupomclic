<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note CupomClic - Gerador de Notas & Locução IA</title>
  <style>
    :root {
      --bg-color: #0d131a;
      --card-bg: #151d27;
      --input-bg: #0b0f14;
      --border-color: #243242;
      --text-main: #f0f4f8;
      --text-muted: #94a3b8;
      --accent-gold: #e69c5e;
      --accent-gold-hover: #d18749;
      --accent-blue: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      margin-top: 10px;
    }

    h1 {
      color: var(--accent-gold);
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p.subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 25px;
    }
    
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      color: var(--accent-blue);
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--accent-gold);
    }
    
    .btn-main {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-gold), #c47c3e);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      margin-top: 10px;
    }

    .btn-main:hover { opacity: 0.95; }
    .btn-main:active { transform: scale(0.99); }

    .results-container {
      margin-top: 30px;
      display: none;
    }

    .result-card {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: bold;
      color: var(--accent-gold);
      text-transform: uppercase;
    }

    .btn-copy {
      background: #22303f;
      color: var(--accent-blue);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-copy:hover {
      background: var(--border-color);
      color: #fff;
    }

    .text-content {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-main);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Área do Áudio MP3 */
    .audio-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px dashed var(--border-color);
    }

    .btn-audio {
      width: 100%;
      padding: 12px;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-audio:hover {
      background: #334155;
      color: #fff;
    }

    .audio-player-box {
      margin-top: 15px;
      display: none;
      text-align: center;
    }

    audio {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 8px;
      outline: none;
    }

    .btn-download {
      display: inline-block;
      width: 100%;
      text-align: center;
      background: var(--accent-gold);
      color: #000;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-download:hover {
      background: var(--accent-gold-hover);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Note CupomClic</h1>
    <p class="subtitle">Gerador de Notas de Venda & Locução em Áudio IA</p>

    <div class="form-group">
      <label>1. Nome do Produto ou Serviço:</label>
      <input type="text" id="produto" placeholder="Ex: Pizza Calabresa, Rodízio de Massas...">
    </div>

    <div class="form-group">
      <label>2. Preço ou Condição da Oferta:</label>
      <input type="text" id="oferta" placeholder="Ex: De R$ 40 por R$ 25">
    </div>

    <div class="form-group">
      <label>3. Estilo / Tom do Texto:</label>
      <select id="estilo">
        <option value="Botini Agressivo (Venda Rápida & Urgência)">🔥 Botini Agressivo (Venda Rápida & Urgência)</option>
        <option value="Emocional e Persuasivo">❤️ Emocional e Persuasivo</option>
        <option value="Curto e Direto ao Ponto">⚡ Curto e Direto ao Ponto</option>
        <option value="Elegante e Exclusivo">✨ Elegante e Exclusivo</option>
      </select>
    </div>

    <button id="btn-gerar" class="btn-main" onclick="gerarNotas()">⚡ Gerar Notas de Venda</button>

    <div id="results" class="results-container">
      <!-- Card Instagram -->
      <div class="result-card">
        <div class="card-header">
          <span class="card-title">📸 Nota para Instagram</span>
          <button class="btn-copy" onclick="copiarTexto('nota-instagram', this)">Copiar Nota</button>
        </div>
        <div id="nota-instagram" class="text-content"></div>
      </div>

      <!-- Card WhatsApp -->
      <div class="result-card">
        <div class="card-header">
          <span class="card-title">💬 Nota para WhatsApp</span>
          <button class="btn-copy" onclick="copiarTexto('nota-whatsapp', this)">Copiar Nota</button>
        </div>
        <div id="nota-whatsapp" class="text-content"></div>
      </div>

      <!-- Card Live / Roteiro com opção de Áudio -->
      <div class="result-card">
        <div class="card-header">
          <span class="card-title">🎙️ Roteiro para Live / Áudio</span>
          <button class="btn-copy" onclick="copiarTexto('nota-live', this)">Copiar Nota</button>
        </div>
        <div id="nota-live" class="text-content"></div>

        <!-- Seção de Áudio MP3 -->
        <div class="audio-section">
          <button id="btn-audio" class="btn-audio" onclick="gerarAudio()">🎙️ Gerar Locução em MP3 (IA)</button>
          
          <div id="audio-box" class="audio-player-box">
            <audio id="audio-player" controls></audio>
            <a id="btn-download" class="btn-download" download="locucao-cupomclic.mp3">⬇️ Baixar Arquivo MP3</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function gerarNotas() {
      const produto = document.getElementById('produto').value.trim();
      const oferta = document.getElementById('oferta').value.trim();
      const estilo = document.getElementById('estilo').value;
      const btn = document.getElementById('btn-gerar');
      const results = document.getElementById('results');

      if (!produto || !oferta) {
        return alert('Preencha o nome do produto e a oferta!');
      }

      btn.innerText = '⏳ Gerando Textos de Alta Conversão...';
      btn.disabled = true;
      results.style.display = 'none';

      // Reseta estado do player de áudio para uma nova geração
      document.getElementById('audio-box').style.display = 'none';
      document.getElementById('btn-audio').style.display = 'block';
      document.getElementById('btn-audio').innerText = '🎙️ Gerar Locução em MP3 (IA)';

      try {
        const res = await fetch('/api/generate-note', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ produto, oferta, estilo })
        });

        const data = await res.json();

        if (data.sucesso && data.notas) {
          document.getElementById('nota-instagram').innerText = data.notas.instagram || '';
          document.getElementById('nota-whatsapp').innerText = data.notas.whatsapp || '';
          document.getElementById('nota-live').innerText = data.notas.live || '';
          results.style.display = 'block';
        } else {
          alert(data.erro || 'Erro ao gerar textos.');
        }
      } catch (err) {
        alert('Erro ao conectar com o servidor.');
      } finally {
        btn.innerText = '⚡ Gerar Notas de Venda';
        btn.disabled = false;
      }
    }

    function copiarTexto(id, btnElement) {
      const text = document.getElementById(id).innerText;
      if (!text) return;

      navigator.clipboard.writeText(text).then(() => {
        const originalText = btnElement.innerText;
        btnElement.innerText = '✅ Copiado!';
        setTimeout(() => { btnElement.innerText = originalText; }, 2000);
      });
    }

    async function gerarAudio() {
      const liveElem = document.getElementById('nota-live');
      const texto = liveElem ? liveElem.innerText.trim() : '';
      const btn = document.getElementById('btn-audio');
      const audioBox = document.getElementById('audio-box');
      const player = document.getElementById('audio-player');
      const downloadBtn = document.getElementById('btn-download');

      if (!texto) {
        return alert('Por favor, clique primeiro em "⚡ Gerar Notas de Venda"!');
      }

      btn.innerText = '⏳ Gravando locução em MP3 via Fal.ai...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/generate-audio', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texto })
        });

        const data = await res.json();

        if (data.sucesso && data.audioUrl) {
          player.src = data.audioUrl;
          downloadBtn.href = data.audioUrl;
          btn.style.display = 'none';
          audioBox.style.display = 'block';
        } else {
          alert(data.erro || 'Erro ao gerar áudio.');
          btn.innerText = '🎙️ Tentar Novamente';
        }
      } catch (err) {
        alert('Erro de conexão ao gerar áudio.');
        btn.innerText = '🎙️ Tentar Novamente';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
